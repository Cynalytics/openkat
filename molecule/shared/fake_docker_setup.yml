---
- name: Ensure fake docker state directory exists
  ansible.builtin.file:
    path: /var/tmp/openkat-fake-docker
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install fake docker CLI for Molecule
  ansible.builtin.copy:
    dest: /usr/bin/docker
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/bin/sh
      set -eu

      state_dir=/var/tmp/openkat-fake-docker
      superuser_flag="$state_dir/rocky-superuser-created"
      mkdir -p "$state_dir"

      if [ "${1:-}" = "compose" ]; then
        shift

        has_all_resources=0
        for arg in "$@"; do
          if [ "$arg" = "--all-resources" ]; then
            has_all_resources=1
          fi
        done

        for arg in "$@"; do
          case "$arg" in
            version)
              echo "Docker Compose version v2.27.0"
              exit 0
              ;;
            ps)
              echo "rocky-container rocky running"
              exit 0
              ;;
            pull|stop)
              exit 0
              ;;
            up)
              if [ "$has_all_resources" -eq 1 ]; then
                exit 0
              fi

              trap 'exit 0' TERM INT
              while :; do
                sleep 300
              done
              ;;
          esac
        done

        exit 0
      fi

      if [ "${1:-}" = "exec" ]; then
        shift
        container_id="${1:-}"
        shift || true
        if [ "${1:-}" = "python" ]; then
          shift
        fi
        manage_py="${1:-}"
        shift || true
        subcommand="${1:-}"
        shift || true

        case "$subcommand" in
          createsuperuser)
            touch "$superuser_flag"
            echo "created ${container_id} via ${manage_py}"
            exit 0
            ;;
          shell)
            if [ "${1:-}" = "-c" ]; then
              shift
            fi
            shell_code="${1:-}"

            case "$shell_code" in
              *superuser_count*)
                if [ -f "$superuser_flag" ]; then
                  echo "HAS_SUPERUSER"
                else
                  echo "NO_SUPERUSER"
                fi
                ;;
              *"Password set successfully"*)
                echo "Password set successfully"
                ;;
              *"Name updated"*)
                echo "Name updated"
                ;;
              *OrganizationMember*|*memberships_created*|*memberships_skipped*)
                echo "memberships_created=0 memberships_skipped=0"
                ;;
              *)
                echo "OK"
                ;;
            esac
            exit 0
            ;;
        esac
      fi

      if [ "${1:-}" = "version" ] || [ "${1:-}" = "--version" ]; then
        echo "Docker version 26.1.0, build fake"
        exit 0
      fi

      echo "fake docker: unsupported command: $*" >&2
      exit 1

- name: Create fake docker.service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Fake Docker service for Molecule

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/bin/install -d -m 0755 /var/tmp/openkat-fake-docker
      ExecStop=/usr/bin/rm -rf /var/tmp/openkat-fake-docker

      [Install]
      WantedBy=multi-user.target

- name: Install fake systemctl for Molecule
  ansible.builtin.copy:
    dest: /usr/bin/systemctl
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/bin/sh
      # Fake systemctl for Molecule tests — ansible.builtin.systemd uses this binary.
      set -eu

      # Strip leading flags (e.g. --no-ask-password, --system)
      while [ "${1:-}" != "${1#-}" ] 2>/dev/null; do
        shift
      done

      CMD="${1:-}"
      shift || true

      case "$CMD" in
        daemon-reload|reset-failed|mask|unmask|isolate|preset|preset-all)
          exit 0
          ;;
        enable|disable|reenable)
          exit 0
          ;;
        is-enabled)
          echo "enabled"
          exit 0
          ;;
        start|stop|restart|reload|try-restart|condrestart|reload-or-restart|force-reload)
          exit 0
          ;;
        is-active)
          echo "active"
          exit 0
          ;;
        is-system-running)
          echo "running"
          exit 0
          ;;
        is-failed)
          echo "not-failed"
          exit 1
          ;;
        show)
          echo "ActiveState=active"
          echo "SubState=running"
          echo "LoadState=loaded"
          echo "UnitFileState=enabled"
          echo "Description=Fake service for Molecule"
          echo "MainPID=1"
          echo "ExecMainPID=1"
          exit 0
          ;;
        list-unit-files|list-units|list-timers|list-sockets|list-dependencies)
          exit 0
          ;;
        cat|status)
          echo "● fake.service - Fake service"
          echo "   Active: active (running)"
          exit 0
          ;;
        *)
          echo "fake systemctl: ignoring: $CMD $*" >&2
          exit 0
          ;;
      esac

- name: Touch marker indicating fake docker setup completed
  ansible.builtin.file:
    path: /var/tmp/openkat-fake-docker/setup-complete
    state: touch
    access_time: preserve
    modification_time: preserve
    owner: root
    group: root
    mode: '0644'
