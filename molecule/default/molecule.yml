---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: openkat-debian12
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..
  inventory:
    host_vars:
      openkat-debian12:
        openkat_superuser_fullname: Molecule Admin
        openkat_superuser_email: admin@molecule.test
        openkat_traefik_letsencrypt_admin_email: letsencrypt@molecule.test
        openkat_backupninja_enabled: false
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy