---
- name: Converge failure scenario
  hosts: all
  gather_facts: false
  tasks:
    - name: Attempt to apply role without required variables
      check_mode: true
      block:
        - name: Include openkat role
          ansible.builtin.include_role:
            name: openkat

        - name: Fail because role unexpectedly succeeded
          ansible.builtin.fail:
            msg: Role unexpectedly converged without required variables.
      rescue:
        - name: Assert role failed for required variable validation
          ansible.builtin.assert:
            that:
              - ansible_failed_result is defined
              - >-
                (
                  (ansible_failed_result.msg | default('')) is search('Variable .* is required but not defined')
                )
                or
                (
                  (
                    ansible_failed_result.results | default([])
                    | map(attribute='msg')
                    | select('search', 'Variable .* is required but not defined')
                    | list
                    | length
                  ) > 0
                )
              - ansible_failed_task.name == 'Check For Variables That Are Required But Do Not Have Defaults'
