name: Publish To Ansible Galaxy

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to import (for example 1.21.1)
        required: true
        type: string

permissions:
  contents: read

jobs:
  galaxy-import:
    name: Import role release in Galaxy
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ansible-core
        run: python -m pip install --upgrade ansible-core

      - name: Resolve tag to import
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Unable to determine release tag." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Trigger Galaxy import
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${GALAXY_API_KEY:-}" ]]; then
            echo "GALAXY_API_KEY secret is not configured." >&2
            exit 1
          fi

          ansible-galaxy role import \
            --token "$GALAXY_API_KEY" \
            --branch "${{ steps.release_tag.outputs.tag }}" \
            --role-name openkat \
            cynalytics openkat

      - name: Wait for Galaxy import completion
        env:
          GALAXY_API_KEY: ${{ secrets.GALAXY_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..20}; do
            echo "Checking Galaxy import status (attempt $attempt/20)..."
            output="$(ansible-galaxy role import --token "$GALAXY_API_KEY" --status cynalytics openkat 2>&1 || true)"
            echo "$output"

            if echo "$output" | grep -qi 'SUCCESS'; then
              echo "Galaxy import completed successfully."
              exit 0
            fi

            if echo "$output" | grep -qiE 'FAILED|ERROR'; then
              echo "Galaxy import failed." >&2
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for Galaxy import completion." >&2
          exit 1
